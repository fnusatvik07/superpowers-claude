<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="30%" style="stop-color:#fce8e6"/>
      <stop offset="60%" style="stop-color:#fdf6e3"/>
      <stop offset="100%" style="stop-color:#e8f5f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo -->
  <rect x="528" y="80" width="48" height="48" rx="12" fill="#e85d75"/>
  <text x="552" y="113" text-anchor="middle" font-size="24" font-weight="900" fill="#1a1a2e">◆</text>
  <text x="600" y="112" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#1a1a2e" letter-spacing="-0.5">A Datasense Workshop</text>

  <!-- SuperPowers -->
  <text x="600" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="90" font-weight="900" fill="#e85d75" letter-spacing="-3">SuperPowers</text>

  <!-- Give Claude Code a spine -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="#1a1a2e" letter-spacing="-2">Give Claude Code a spine.</text>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" fill="#1a1a2e" opacity="0.6">14 skills. One plugin install. Better judgment.</text>

  <!-- Skill pills -->
  <g transform="translate(230, 440)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <text x="65" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">brainstorming</text>

    <rect x="150" y="0" width="70" height="36" rx="18" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <text x="185" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">TDD</text>

    <rect x="240" y="0" width="70" height="36" rx="18" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <text x="275" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">SDD</text>

    <rect x="330" y="0" width="130" height="36" rx="18" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <text x="395" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">code-review</text>

    <rect x="480" y="0" width="130" height="36" rx="18" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <text x="545" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">verification</text>
  </g>
</svg>
